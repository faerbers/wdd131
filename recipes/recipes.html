<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <meta name="Shelby Faerber" content="Author Name">
    <meta name="description" content="webiste with different recipes with reviews">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="Recipes with reviews of them">
    <meta property="og:url" content="https://faerbers.github.io/wdd131/recipes/recipes.html">
    <meta property="og:image" content="social-preview-image.png">
    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="Recipes with reviews of them">
    <meta name="twitter:image" content="social-preview-image.png"> <!---->
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico"> <!---->
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"> <!---->
    <!--Stylesheet-->
    <link rel="stylesheet" href="recipes.css">
    <script defer src="recipes.js"></script>
  </head>

  <body>
    <header>
      <img id="logo" src="images/recipe-book.png" alt="recipebook logo">
      <h1>RECIPEBOOK</h1>
    </header>

    <form class="search" action="#" role="search" aria-label="Search">
      <input type="search" class="search-input" aria-label="search-bar" placeholder="Find a recipe">
      <button class="search-btn" type="submit" aria-label="magnifying glass button">
        <img class="search-icon" src="images/search.svg" alt="">
      </button>
    </form>

    <main>
      <div id='recipe-container'>

      </div>
    </main>

    <footer>

      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
      </div>
      <div class="flaticon">
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
          Recipe icons created by Freepik - Flaticon</a>
      </div>
    </footer>
  </body>

</html>
